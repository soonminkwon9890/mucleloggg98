      <text x="32" y="656" font-size="12" fill="#8E8E93">대퇴사두 · 3세트 × 10회</text>
      <rect x="322" y="637" width="48" height="22" rx="11" fill="#2196F3" fill-opacity="0.145"/>
      <text x="346" y="652" text-anchor="middle" font-size="13" font-weight="700" fill="#2196F3">보통</text>
