<svg xmlns="http://www.w3.org/2000/svg" width="402" height="874" viewBox="0 0 402 874" font-family="-apple-system, 'SF Pro Display', 'Roboto', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">

