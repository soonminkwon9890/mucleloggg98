      <rect x="2" y="2" width="20" height="9" rx="2" fill="#FFFFFF"/>
      <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill="#FFFFFF" fill-opacity="0.4"/>
